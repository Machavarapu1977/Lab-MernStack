<!DOCTYPE html>
<html>
    <head>
        <title>Largest Number</title>
    </head>
</html>
<body>
    <script>
        let a=parseInt(prompt("Enter first value: "));
        let b=parseInt(prompt("Enter second value: "));
        let c=parseInt(prompt("Enter third value: "));
        if(a>b && a>c){
            document.write(a+"Largest Number");
            alert(a+"Largest number");
        }
        else if(b>a && b>c){
            document.write(b+" Largest number");
            alert(b+" Largest number");
        }
        else if(c>a && c>b){
            document.write(c+" Largest number");
            alert(c+" Largest number");
        }
        else{
            document.write(" Equal numbers");
            alert(" equal numbers");
        }
    </script>
</body>
